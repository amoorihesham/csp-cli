name: Release

on:
  push:
    branches: [main]

# Prevent concurrent releases (e.g. two quick merges to main)
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: semantic-release
    runs-on: ubuntu-latest

    # Skip the commit that semantic-release itself pushes back to main
    # (chore(release): x.x.x [skip ci]) to avoid an infinite loop.
    if: "!startsWith(github.event.head_commit.message, 'chore(release)')"

    # Required by semantic-release to push tags, create releases, and publish
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write   # enables npm provenance

    steps:
      - name: Checkout (full history required by semantic-release)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Release
        run: pnpm dlx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
